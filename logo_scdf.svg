<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&amp;family=DM+Sans:wght@300;400&amp;display=swap');
      .lg { font-family: 'Cormorant Garamond', Georgia, serif; }
      .ls { font-family: 'DM Sans', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="600" height="300" rx="4" fill="#0b1d35"/>

  <!-- Anillo exterior -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#c4973b" stroke-width="1.2"/>
  <!-- Anillo interior punteado -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="#c4973b" stroke-width="0.6" stroke-dasharray="4 5"/>

  <!-- Ejes de medición -->
  <line x1="200" y1="62" x2="200" y2="238" stroke="#c4973b" stroke-width="0.6" opacity="0.4"/>
  <line x1="112" y1="150" x2="288" y2="150" stroke="#c4973b" stroke-width="0.6" opacity="0.4"/>

  <!-- Curva dinamométrica -->
  <path d="M128 150 C142 150 148 105 170 105 C192 105 198 195 222 195 C246 195 252 120 272 120 C282 120 285 150 290 150"
        fill="none" stroke="#c4973b" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Puntos en picos -->
  <circle cx="170" cy="105" r="3.5" fill="#c4973b"/>
  <circle cx="222" cy="195" r="3.5" fill="#c4973b"/>

  <!-- Marcas en eje horizontal -->
  <line x1="148" y1="146" x2="148" y2="154" stroke="#c4973b" stroke-width="1.2" opacity="0.6"/>
  <line x1="182" y1="146" x2="182" y2="154" stroke="#c4973b" stroke-width="1.2" opacity="0.6"/>
  <line x1="216" y1="146" x2="216" y2="154" stroke="#c4973b" stroke-width="1.2" opacity="0.6"/>
  <line x1="250" y1="146" x2="250" y2="154" stroke="#c4973b" stroke-width="1.2" opacity="0.6"/>

  <!-- Acrónimo SCDF -->
  <text x="340" y="118" class="lg" font-size="68" font-weight="300" fill="#ffffff" letter-spacing="6">SCDF</text>

  <!-- Línea dorada bajo acrónimo -->
  <line x1="340" y1="132" x2="565" y2="132" stroke="#c4973b" stroke-width="1"/>

  <!-- Nombre completo -->
  <text x="340" y="158" class="lg" font-size="15.5" font-weight="300" fill="#c4973b" letter-spacing="0.8">Sociedad Científica de</text>
  <text x="340" y="178" class="lg" font-size="15.5" font-weight="400" fill="#ffffff" letter-spacing="0.4">Dinamometría Funcional</text>

  <!-- Subtítulo en inglés -->
  <text x="340" y="208" class="ls" font-size="8.5" font-weight="300" fill="#7a95b0" letter-spacing="2">SCIENTIFIC SOCIETY OF FUNCTIONAL DYNAMOMETRY</text>

  <!-- Línea inferior -->
  <line x1="340" y1="224" x2="565" y2="224" stroke="#c4973b" stroke-width="0.5" opacity="0.35"/>

  <!-- Sede y año -->
  <text x="340" y="242" class="ls" font-size="9" font-weight="300" fill="#4e6880" letter-spacing="2">GRANADA · ESPAÑA · EST. 2024</text>
</svg>
